version: "3.9"

volumes:
  postgres-data:
  ingestion-volume-dag-airflow:
  ingestion-volume-dags:
  ingestion-volume-tmp:


services:
  postgres:
    container_name: openmetadata_postgres
    image: postgres:15
    restart: always
    network_mode: host
    environment:
      POSTGRES_USER: openmetadata_user
      POSTGRES_PASSWORD: openmetadata_password
      POSTGRES_DB: openmetadata_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmetadata_user -d openmetadata_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenSearch is replaced by es-sqlite running on the host at port 9200.
  # We use a lightweight healthcheck container to satisfy the depends_on condition.
  opensearch-healthcheck:
    container_name: openmetadata_opensearch_healthcheck
    image: curlimages/curl:latest
    network_mode: host
    # Wait for es-sqlite on the host to be available
    entrypoint: ["sh", "-c", "while ! curl -sf http://host.docker.internal:9200/_cluster/health; do echo 'Waiting for es-sqlite...'; sleep 2; done; echo 'es-sqlite is up'; sleep infinity"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://host.docker.internal:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  openmetadata-server:
    container_name: openmetadata_server
    image: docker.getcollate.io/openmetadata/server:1.11.7
    restart: always
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      opensearch-healthcheck:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
      echo 'Running database migrations...';
      ./bootstrap/openmetadata-ops.sh migrate;
      echo 'Initializing search indices...';
      ./bootstrap/openmetadata-ops.sh reindex || echo 'Reindex failed or no changes detected';
      echo 'Starting OpenMetadata server...';
      exec /openmetadata-start.sh
      "
    environment:
      # Basic Configuration
      OPENMETADATA_CLUSTER_NAME: openmetadata

      # Database Configuration (PostgreSQL)
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_USE_SSL: "false"
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_password
      OM_DATABASE: openmetadata_db

      # Database Migration
      MIGRATION_LIMIT_PARAM: 1200

      # Search Configuration - OpenSearch (pointing to es-sqlite on host)
      SEARCH_TYPE: opensearch
      ELASTICSEARCH_HOST: host.docker.internal
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
      ELASTICSEARCH_USER: ""
      ELASTICSEARCH_PASSWORD: ""

      # Pipeline Service Client Configuration
      PIPELINE_SERVICE_CLIENT_ENABLED: "true"
      PIPELINE_SERVICE_CLIENT_CLASS_NAME: "org.openmetadata.service.clients.pipeline.airflow.AirflowRESTClient"
      PIPELINE_SERVICE_CLIENT_ENDPOINT: "http://localhost:8080"
      PIPELINE_SERVICE_CLIENT_VERIFY_SSL: "no-ssl"
      PIPELINE_SERVICE_CLIENT_SSL_CERT_PATH: ""
      SERVER_HOST_API_URL: "http://localhost:8585/api"

      # Authentication Configuration (Basic)
      AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.DefaultAuthorizer
      AUTHORIZER_REQUEST_FILTER: org.openmetadata.service.security.JwtFilter
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin]"
      AUTHORIZER_PRINCIPAL_DOMAIN: "open-metadata.org"

      # JWT Configuration
      AUTHENTICATION_PROVIDER: basic
      AUTHENTICATION_PUBLIC_KEYS: "[http://localhost:8585/api/v1/system/config/jwks]"
      AUTHENTICATION_AUTHORITY: "https://accounts.google.com"
      AUTHENTICATION_CLIENT_ID: ""
      AUTHENTICATION_CALLBACK_URL: ""

      # Fernet Key for encryption (generate your own for production)
      FERNET_KEY: "jJ/9sz0g0OHxsfxOoSfdFdmk3ysNmPRnH3TUAbz3IHA="

      # Server Configuration
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: 8585
      SERVER_ADMIN_PORT: 8586

      # Airflow Configuration
      AIRFLOW_HOST: "http://localhost:8080"
      AIRFLOW_USERNAME: "admin"
      AIRFLOW_PASSWORD: "admin"

      # OpenMetadata Server URLs
      OM_URI: "http://localhost:8585"

    volumes:
      - ingestion-volume-dag-airflow:/opt/airflow/dag_generated_configs
      - ingestion-volume-dags:/opt/airflow/dags
      - ingestion-volume-tmp:/tmp
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8586/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ingestion:
    container_name: openmetadata_ingestion
    image: docker.getcollate.io/openmetadata/ingestion:1.11.7
    restart: always
    network_mode: host
    depends_on:
      openmetadata-server:
        condition: service_healthy
    environment:
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__OPENMETADATA_AIRFLOW_APIS__DAG_GENERATED_CONFIGS: "/opt/airflow/dag_generated_configs"
      DB_HOST: localhost
      DB_PORT: 5432
      AIRFLOW_DB: airflow_db
      DB_USER: openmetadata_user
      DB_PASSWORD: openmetadata_password
      DB_SCHEME: postgresql+psycopg2
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      AIRFLOW_HOME: /opt/airflow
      METADATA_SERVER_URL: http://localhost:8585/api
    command: standalone
    volumes:
      - ingestion-volume-dag-airflow:/opt/airflow/dag_generated_configs
      - ingestion-volume-dags:/opt/airflow/dags
      - ingestion-volume-tmp:/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
